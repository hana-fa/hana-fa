<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>글 보기</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding:40px;
}

h1{
    border-bottom:1px solid #ddd;
    padding-bottom:15px;
}

.info{
    color:#777;
    margin-bottom:30px;
}

.content{
    line-height:1.8;
}
</style>

</head>

<body>

<h1 id="title"></h1>

<div class="info">
작성자 : <span id="writer"></span>
&nbsp; | &nbsp;
날짜 : <span id="date"></span>
</div>

<div class="content" id="content"></div>


<script>

fetch("posts.json")
.then(response => response.json())
.then(posts => {

    const params = new URLSearchParams(location.search);
    const id = params.get("id");


    const post = posts.find(
        item => item.id == id
    );


    if(post){

        document.getElementById("title").innerHTML = post.title;

        document.getElementById("writer").innerHTML = post.writer;

        document.getElementById("date").innerHTML = post.date;

        document.getElementById("content").innerHTML = post.content;

    }

});

</script>


</body>
</html>
