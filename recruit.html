<div class="tab-container">

    <!-- 버튼 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab('talent', this)">인재상</button>
        <button class="tab-btn" onclick="showTab('process', this)">채용절차</button>
    </div>

    <!-- 이미지 -->
    <div class="tab-content">

        <div id="talent" class="tab-box show">
            <img src="assets/img/c1.png">
        </div>

        <div id="process" class="tab-box">
            <img src="assets/img/c2.png">
        </div>

    </div>

</div>

<style>

/* 🔥 전체 위치를 아래로 내림 */
.tab-container {
    display: flex;
    gap: 40px;
    align-items: flex-start;   /* ← 위 정렬로 변경 (중앙 → 위 기준) */
    justify-content: center;
    padding-top: 80px;         /* 🔥 여기로 위치 아래로 내림 */
}

/* 버튼 */
.tab-menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* 버튼 스타일 */
.tab-btn {
    padding: 12px 18px;
    border: none;
    cursor: pointer;
    background: #f2f2f2;
    border-radius: 6px;
    transition: 0.3s;
}

.tab-btn.active {
    background: #9e9e9e;
    color: white;
}

/* 🔥 이미지 크게 */
.tab-content img {
    width: 85%;          /* ← 60% → 85%로 확대 */
    max-width: 1200px;   /* ← 더 크게 */
}

/* 기본 숨김 */
.tab-box {
    display: none;
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}

/* 활성 */
.tab-box.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* 📱 모바일 */
@media (max-width: 768px) {
    .tab-container {
        flex-direction: column;
        padding-top: 40px;
    }

    .tab-menu {
        flex-direction: row;
    }

    .tab-btn {
        flex: 1;
    }

    .tab-content img {
        width: 95%;
    }
}

</style>

<script>
function showTab(id, btn) {

    document.querySelectorAll('.tab-box').forEach(el => {
        el.classList.remove('show');
    });

    document.getElementById(id).classList.add('show');

    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
    });

    btn.classList.add('active');
}
</script>
