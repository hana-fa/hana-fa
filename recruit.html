<div class="tab-container">

    <!-- 버튼 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab('talent', this)">인재상</button>
        <button class="tab-btn" onclick="showTab('process', this)">채용절차</button>
    </div>

    <!-- 이미지 -->
    <div class="tab-content">

        <div id="talent" class="tab-box show">
            <img src="assets/img/c1.png">
        </div>

        <div id="process" class="tab-box">
            <img src="assets/img/c2.png">
        </div>

    </div>

</div>

<style>
.tab-container {
    display: flex;
    gap: 40px;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
}

.tab-menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.tab-btn {
    padding: 12px 18px;
    border: none;
    cursor: pointer;
    background: #f2f2f2;
    border-radius: 6px;
    transition: 0.3s;
}

.tab-btn.active {
    background: #9e9e9e;
    color: white;
}

.tab-content img {
    width: 60%;
    max-width: 900px;
}

.tab-box {
    display: none;
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}

.tab-box.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* 모바일 */
@media (max-width: 768px) {
    .tab-container {
        flex-direction: column;
        min-height: auto;
        padding: 40px 0;
    }

    .tab-menu {
        flex-direction: row;
    }

    .tab-btn {
        flex: 1;
    }

    .tab-content img {
        width: 90%;
    }
}
</style>

<script>
function showTab(id, btn) {

    document.querySelectorAll('.tab-box').forEach(el => {
        el.classList.remove('show');
    });

    document.getElementById(id).classList.add('show');

    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
    });

    btn.classList.add('active');
}
</script>
