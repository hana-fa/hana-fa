<style>

/* 전체 */
.tab-wrapper{
    text-align:center;
    padding-top:90px;
}


/* 버튼 영역 */
.tab-menu{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:40px;
}


/* 버튼 */
.tab-btn{
    padding:10px 18px;
    border:none;
    background:#eeeeee;
    cursor:pointer;
    border-radius:6px;
    transition:0.3s;
    font-weight:500;
}


/* 활성 버튼 */
.tab-btn.active{
    background:#9e9e9e;
    color:#fff;
}


/* hover */
.tab-btn:hover{
    background:#d6d6d6;
}


/* 이미지 영역 */
.tab-content{
    display:flex;
    }


/* 이미지 애니메이션 */
.tab-img{

    width:85%;
    max-width:1200px;
    margin:0 auto;

    opacity:0;
    visibility:hidden;

    transform:scale(0.95);

    transition:
        opacity 0.7s ease,
        transform 0.7s ease;

    position:absolute;
}


/* 활성 이미지 */
.tab-img.show{

    opacity:1;
    visibility:visible;

    transform:scale(1);

    position:relative;
}


/* 모바일 */
@media (max-width:768px){

    .tab-wrapper{
        padding-top:60px;
    }


    .tab-img{
        width:95%;
    }

}

</style>


<script>

function showTab(id, btn){

    // 이미지 변경
    document.querySelectorAll('.tab-img').forEach(img=>{
        img.classList.remove('show');
    });


    document.getElementById(id).classList.add('show');


    // 버튼 active
    document.querySelectorAll('.tab-btn').forEach(b=>{
        b.classList.remove('active');
    });


    btn.classList.add('active');

}

</script>
