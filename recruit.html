<div style="text-align:center; padding-top:80px;">

    <!-- 버튼 -->
    <div style="margin-bottom:30px;">
        <button onclick="showTab('t1', this)" class="activeBtn">인재상</button>
        <button onclick="showTab('t2', this)">채용절차</button>
    </div>

    <!-- 이미지 -->
    <div>
        <img id="t1" src="assets/img/c1.png" style="width:85%; max-width:1200px;">
        <img id="t2" src="assets/img/c2.png" style="width:85%; max-width:1200px; display:none;">
    </div>

</div>

<style>
button{
    padding:10px 16px;
    border:none;
    background:#f2f2f2;
    cursor:pointer;
}

button.active{
    background:#999;
    color:white;
}
</style>

<script>
function showTab(id, btn){

    document.getElementById('t1').style.display='none';
    document.getElementById('t2').style.display='none';

    document.getElementById(id).style.display='block';

    document.querySelectorAll('button').forEach(b=>{
        b.classList.remove('active');
    });

    btn.classList.add('active');
}
</script>
