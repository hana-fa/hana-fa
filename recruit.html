        </div> </div> </div> <style>

/* 전체 */
.tab-wrapper{
    text-align:center;
    padding-top:120px;
}

/* 버튼 */
.tab-menu{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:40px;
}

.tab-btn{
    padding:10px 18px;
    border:none;
    background:#eee;
    cursor:pointer;
    border-radius:6px;
    position: relative;
    z-index: 1000;
}

.tab-btn.active{
    background:#9e9e9e;
    color:white;
}

/* 내용 영역 */
.tab-content{
    display:block;
    width:100%;
    position: relative; /* 💡 사진들이 겹쳐서 부드럽게 전환되도록 설정 */
}

/* ✨ 이미지 서서히 나타나는 효과 설정 */
.tab-img{
    position: absolute; /* 💡 서서히 나타날 때 자리를 차지하지 않고 자연스럽게 교차되도록 함 */
    left: 50%;
    transform: translateX(-50%);
    width:85%;
    max-width:1200px;
    margin:0 auto;

    opacity: 0;            /* 기본 상태: 투명하게 */
    visibility: hidden;    /* 기본 상태: 숨김 */
    transition: opacity 0.6s ease, visibility 0.6s ease; /* 0.6초 동안 서서히 전환 */
}

/* 활성화된 이미지 */
.tab-img.show{
    position: relative;    /* 현재 보여야 하는 이미지만 자기 영역을 가짐 */
    opacity: 1;            /* 보임 */
    visibility: visible;   /* 클릭 가능 */
}

/* 게시판 */
.notice-board{
    display:none;
    width:85%;
    max-width:1200px;
    margin:0 auto;
}

.notice-board.show{
    display:block;
}

/* 게시판 디자인 */
.board-top{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

.notice-table{
    width:100%;
    border-collapse:collapse;
}

.notice-table th{
    padding:15px;
    border-bottom:1px solid #ddd;
}

.notice-table td{
    padding:15px;
    border-bottom:1px solid #eee;
}

.notice-table .title{
    text-align:left;
}

.paging{
    margin:30px 0;
}

.paging span{
    background:#eee;
    padding:5px 10px;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:5px;
}

</style>

<script>
function showTab(id, btn){

    // 모든 이미지 숨기기 (fade-out)
    document.querySelectorAll('.tab-img').forEach(function(item){
        item.classList.remove('show');
    });

    // 모든 게시판 숨기기
    document.querySelectorAll('.notice-board').forEach(function(item){
        item.classList.remove('show');
    });

    // 클릭한 탭 보여주기 (fade-in)
    var target = document.getElementById(id);
    if(target){
        target.classList.add('show');
    }

    // 모든 버튼 비활성화
    document.querySelectorAll('.tab-btn').forEach(function(b){
        b.classList.remove('active');
    });

    // 클릭한 버튼만 활성화
    btn.classList.add('active');
}
</script>
