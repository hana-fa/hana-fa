<div class="tab-wrapper">

    <!-- 버튼 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab('talent', this)">인재상</button>
        <button class="tab-btn" onclick="showTab('process', this)">채용절차</button>
    </div>

    <!-- 이미지 -->
    <div class="tab-content">

        <img id="talent" class="tab-img show" src="assets/img/c1.png">
        <img id="process" class="tab-img" src="assets/img/c2.png">

    </div>

</div>

<style>

/* 전체 */
.tab-wrapper{
    text-align:center;
    padding-top:80px;   /* 위에서 아래로 내림 */
}

/* 버튼 */
.tab-menu{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:30px;
}

/* 기본 버튼 */
.tab-btn{
    padding:10px 16px;
    border:none;
    background:#f2f2f2;
    cursor:pointer;
    border-radius:5px;
}

/* 선택된 버튼 */
.tab-btn.active{
    background:#9e9e9e;
    color:white;
}

/* 이미지 */
.tab-img{
    display:none;
    width:85%;          /* 🔥 크게 */
    max-width:1200px;
}

/* 보이는 이미지 */
.tab-img.show{
    display:block;
}

/* 모바일 */
@media (max-width:768px){
    .tab-wrapper{
        padding-top:40px;
    }

    .tab-img{
        width:95%;
    }

    .tab-menu{
        flex-direction:row;
    }
}

</style>

<script>

function showTab(id, btn){

    // 이미지 숨기기
    document.querySelectorAll('.tab-img').forEach(img=>{
        img.classList.remove('show');
    });

    // 선택 이미지 표시
    document.getElementById(id).classList.add('show');

    // 버튼 active 변경
    document.querySelectorAll('.tab-btn').forEach(b=>{
        b.classList.remove('active');
    });

    btn.classList.add('active');
}

</script>
