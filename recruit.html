<div class="tab-wrapper">

    <!-- 버튼 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab('talent', this)">인재상</button>
        <button class="tab-btn" onclick="showTab('process', this)">채용절차</button>
        <button class="tab-btn" onclick="showTab('notice', this)">채용공고</button>
    </div>


    <!-- 내용 -->
    <div class="tab-content">

        <!-- 이미지 -->
        <img id="talent" class="tab-img show" src="assets/img/c1.png">

        <img id="process" class="tab-img" src="assets/img/c2.png">


        <!-- 게시판 -->
        <div id="notice" class="notice-board">

            <div class="board-top">
                <span>Total 1</span>

                <select>
                    <option>Newest</option>
                    <option>Oldest</option>
                </select>
            </div>


            <table class="notice-table">

                <thead>
                    <tr>
                        <th>Number</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Date</th>
                        <th>Votes</th>
                        <th>Views</th>
                    </tr>
                </thead>


                <tbody>

                    <tr>
                        <td>1</td>
                        <td class="title">
                            채용공고가 등록되었습니다.
                        </td>
                        <td>관리자</td>
                        <td>2026.07.09</td>
                        <td>0</td>
                        <td>0</td>
                    </tr>

                </tbody>

            </table>


            <div class="paging">
                <span>1</span>
            </div>


            <div class="search-box">

                <select>
                    <option>All</option>
                    <option>Title</option>
                    <option>Content</option>
                </select>

                <input type="text">

                <button>Search</button>

            </div>

        </div>


    </div>

</div>



<style>

/* 전체 */
.tab-wrapper{
    text-align:center;
    padding-top:90px;
}


/* 버튼 */
.tab-menu{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:40px;
}


.tab-btn{
    padding:10px 18px;
    border:none;
    background:#eee;
    cursor:pointer;
    border-radius:6px;
}


.tab-btn.active{
    background:#9e9e9e;
    color:white;
}



/* 내용 영역 */
.tab-content{
    display:block;
    width:100%;
}



/* 이미지 */
.tab-img{

    display:block;

    width:85%;
    max-width:1200px;

    margin:0 auto;
 opacity:0;
    visibility:hidden;

    transform:scale(0.95);

    transition:
        opacity 0.7s ease,
        transform 0.7s ease;
}


.tab-img.show{

    opacity:1;
    visibility:visible;

    transform:scale(1);

}



/* 게시판 */
.notice-board{

    display:none;

    width:85%;
    max-width:1200px;

    margin:0 auto;

}


.notice-board.show{

    display:block;

}



/* 게시판 디자인 */

.board-top{

    display:flex;
    justify-content:space-between;

    margin-bottom:30px;

}


.notice-table{

    width:100%;
    border-collapse:collapse;

}


.notice-table th{

    padding:15px;
    border-bottom:1px solid #ddd;

}


.notice-table td{

    padding:15px;
    border-bottom:1px solid #eee;

}


.notice-table .title{

    text-align:left;

}



.paging{

    margin:30px 0;

}


.paging span{

    background:#eee;
    padding:5px 10px;

}



.search-box{

    display:flex;
    justify-content:center;
    gap:5px;

}



</style>



<script>

function showTab(id, btn){


    document.querySelectorAll('.tab-img, .notice-board')
    .forEach(item=>{

        item.classList.remove('show');

    });


    document.getElementById(id).classList.add('show');



    document.querySelectorAll('.tab-btn')
    .forEach(b=>{

        b.classList.remove('active');

    });


    btn.classList.add('active');


}

</script>
