        </div> </div> </div> <style>

/* 전체 */
.tab-wrapper{
    text-align:center;
    padding-top:120px; /* 💡 홈버튼과 겹치지 않도록 여백을 넓혔습니다. */
}

/* 버튼 */
.tab-menu{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:40px;
}

.tab-btn{
    padding:10px 18px;
    border:none;
    background:#eee;
    cursor:pointer;
    border-radius:6px;
    position: relative;
    z-index: 1000; /* 💡 홈버튼보다 버튼이 위에 오도록 우선순위를 높였습니다. */
}

.tab-btn.active{
    background:#9e9e9e;
    color:white;
}

/* 내용 영역 */
.tab-content{
    display:block;
    width:100%;
}

/* 이미지 */
.tab-img{
    display: none; /* 💡 버그를 일으키던 복잡한 opacity 애니메이션 대신, 확실하게 켜고 끄도록 수정했습니다. */
    width:85%;
    max-width:1200px;
    margin:0 auto;
}

.tab-img.show{
    display: block; /* 💡 활성화되면 화면에 나타납니다. */
}

/* 게시판 */
.notice-board{
    display:none;
    width:85%;
    max-width:1200px;
    margin:0 auto;
}

.notice-board.show{
    display:block;
}

/* 게시판 디자인 */
.board-top{
    display:flex;
    justify-content:space-between;

    margin-bottom:30px;
}

.notice-table{
    width:100%;
    border-collapse:collapse;
}

.notice-table th{
    padding:15px;
    border-bottom:1px solid #ddd;
}

.notice-table td{
    padding:15px;
    border-bottom:1px solid #eee;
}

.notice-table .title{
    text-align:left;
}

.paging{
    margin:30px 0;
}

.paging span{
    background:#eee;
    padding:5px 10px;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:5px;
}

</style>

<script>
// 번거롭던 alert 메시지는 삭제했습니다.

function showTab(id, btn){

    // 모든 이미지 숨기기
    document.querySelectorAll('.tab-img').forEach(function(item){
        item.classList.remove('show');
    });

    // 모든 게시판 숨기기
    document.querySelectorAll('.notice-board').forEach(function(item){
        item.classList.remove('show');
    });

    // 클릭한 탭의 ID를 가진 요소 보여주기
    var target = document.getElementById(id);
    if(target){
        target.classList.add('show');
    }

    // 모든 버튼 비활성화
    document.querySelectorAll('.tab-btn').forEach(function(b){
        b.classList.remove('active');
    });

    // 클릭한 버튼만 활성화
    btn.classList.add('active');
}
</script>
