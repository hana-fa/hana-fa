<div class="tab-container">

    <!-- 왼쪽 버튼 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab('talent', this)">인재상</button>
        <button class="tab-btn" onclick="showTab('process', this)">채용절차</button>
    </div>

    <!-- 오른쪽 이미지 -->
    <div class="tab-content">

        <img id="talent" src="assets/img/c1.png" class="tab-img show">
        <img id="process" src="assets/img/c2.png" class="tab-img">

    </div>

</div>

<style>

/* 🔥 전체 중앙 정렬 */
.tab-container {
    display: flex;
    gap: 40px;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
}

/* 왼쪽 버튼 영역 */
.tab-menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* 기본 버튼 (연한 회색) */
.tab-btn {
    padding: 12px 18px;
    border: none;
    cursor: pointer;
    background: #f2f2f2;   /* 연한 회색 */
    color: #333;
    font-weight: bold;
    transition: 0.3s;
    border-radius: 6px;
}

/* 선택된 버튼 (진한 회색) */
.tab-btn.active {
    background: #9e9e9e;   /* 진한 회색 */
    color: #fff;
}

/* hover 효과 */
.tab-btn:hover {
    background: #d6d6d6;
}

/* 오른쪽 이미지 영역 */
.tab-content {
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔥 이미지 애니메이션 */
.tab-img {
    width: 60%;
    max-width: 900px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    display: none;
}

/* 활성 이미지 */
.tab-img.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* 📱 모바일 */
@media (max-width: 768px) {

    .tab-container {
        flex-direction: column;
        min-height: auto;
        padding: 40px 0;
    }

    .tab-menu {
        flex-direction: row;
        justify-content: center;
    }

    .tab-btn {
        flex: 1;
        text-align: center;
    }

    .tab-img {
        width: 90%;
    }
}

</style>

<script>
function showTab(id, btn) {

    // 이미지 전환
    document.querySelectorAll('.tab-img').forEach(img => {
        img.classList.remove('show');
    });

    const target = document.getElementById(id);
    target.classList.add('show');

    // 버튼 활성화
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
    });

    btn.classList.add('active');
}
</script>
