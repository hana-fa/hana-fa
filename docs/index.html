<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>우리회사</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background: linear-gradient(135deg, #74ebd5, #9face6);
    }

    /* 🔥 슬라이드 */
    .slider {
      width: 100%;
      height: 400px;
      overflow: hidden;
      position: relative;
    }

    .slide {
      width: 100%;
      height: 400px;
      object-fit: cover;
      display: none;
    }

    .slide.active {
      display: block;
    }

    /* 상단 */
    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    /* 메뉴 */
    nav {
      background: #34495e;
      text-align: center;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }

    /* 메인 */
    .container {
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      color: #2c3e50;
      margin-top: 40px;
    }

    /* 버튼 */
    .btn {
      display: inline-block;
      background: #3498db;
      color: white;
      padding: 10px 20px;
      margin-top: 10px;
      text-decoration: none;
      border-radius: 5px;
    }

    /* 히어로 */
    .hero {
      text-align: center;
      margin-top: 30px;
      background: white;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .hero h1 {
      font-size: 40px;
    }

    /* 하단 */
    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- 🔥 슬라이드 (맨 위) -->
  <div class="slider">
    <img class="slide active" src="https://picsum.photos/1200/400?1">
    <img class="slide" src="https://picsum.photos/1200/400?2">
    <img class="slide" src="https://picsum.photos/1200/400?3">
  </div>

  <header>
    <h1>우리회사</h1>
    <p>최고의 솔루션을 제공합니다</p>
  </header>

  <nav>
    <a href="#">홈</a>
    <a href="#">회사소개</a>
    <a href="#">사업영역</a>
    <a href="#">문의</a>
  </nav>

  <div class="container">

    <div class="hero">
      <h1>내 첫 웹사이트 🚀</h1>
      <p>GitHub Pages 성공!</p>

      <a class="btn" href="https://github.com" target="_blank">
        GitHub 가기
      </a>
    </div>

    <h2>회사 소개</h2>
    <p>
      우리는 고객에게 최적의 IT 솔루션을 제공합니다.
    </p>

    <h2>사업 분야</h2>
    <ul>
      <li>웹사이트 제작</li>
      <li>모바일 앱 개발</li>
      <li>시스템 유지보수</li>
    </ul>

    <h2>문의</h2>
    <p>전화: 010-0000-0000</p>
    <p>이메일: info@company.com</p>

    <a class="btn" href="#">문의하기</a>

  </div>

  <footer>
    © 2026 우리회사. All rights reserved.
  </footer>

  <!-- 🔥 슬라이드 JS -->
  <script>
    let index = 0;
    const slides = document.querySelectorAll('.slide');

    function showSlide() {
      slides.forEach(s => s.classList.remove('active'));
      slides[index].classList.add('active');
    }

    function nextSlide() {
      index = (index + 1) % slides.length;
      showSlide();
    }

    showSlide();
    setInterval(nextSlide, 3000);
  </script>

</body>
</html>
