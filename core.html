<div class="tab-wrapper" style="text-align: center; padding-top: 90px; padding-bottom: 90px;">
    
    <style>
        .fade-in-target {
            max-width: 100%;
            height: auto;
            display: inline-block;
            
            /* 테두리와 그림자는 지우고 애니메이션만 유지합니다 */
            animation: fadeInUpOnly 1.2s ease-out forwards;
        }

        @keyframes fadeInUpOnly {
            from {
                opacity: 0;
                transform: translateY(40px); /* 40px 아래에서 투명하게 시작 */
            }
            to {
                opacity: 1;
                transform: translateY(0);    /* 원래 위치로 오면서 선명해짐 */
            }
        }
    </style>

    <div class="tab-content">
        <img class="fade-in-target" src="assets/img/co1.png" alt="핵심강점">
    </div>

</div>







<style>

/* 전체 */
.tab-wrapper{
    text-align:center;
    padding-top:90px;
}

/* 버튼 영역 */
.tab-menu{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:40px;
}

/* 버튼 */
.tab-btn{
    padding:10px 18px;
    border:none;
    background:#eeeeee;
    cursor:pointer;
    border-radius:6px;
    transition:0.3s;
    font-weight:500;
}

/* 활성 버튼 */
.tab-btn.active{
    background:#9e9e9e;
    color:#fff;
}

/* hover */
.tab-btn:hover{
    background:#d6d6d6;
}

/* 이미지 영역 */
.tab-content{
    display:flex;
    justify-content:center;
}

/* 🔥 핵심: 이미지 애니메이션 */
.tab-img{
    display:none;
    width:85%;
    max-width:1200px;
    margin:0 auto;

    opacity:0;
    transform: scale(0.95);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

/* 활성 이미지 */
.tab-img.show{
    display:block;
    opacity:1;
    transform: scale(1);
}

/* 모바일 */
@media (max-width:768px){

    .tab-wrapper{
        padding-top:60px;
    }

    .tab-img{
        width:95%;
    }
}

</style>

<script>

function showTab(id, btn){

    // 이미지 변경
    document.querySelectorAll('.tab-img').forEach(img=>{
        img.classList.remove('show');
    });

    document.getElementById(id).classList.add('show');

    // 버튼 active
    document.querySelectorAll('.tab-btn').forEach(b=>{
        b.classList.remove('active');
    });

    btn.classList.add('active');
}

</script>

<div class="slider-wrapper" style="text-align: center; padding-top: 20px; padding-bottom: 90px; position: relative;">
    
    <style>
        /* 슬라이더 전체를 감싸는 윈도우 */
        .slider-container {
            position: relative;
            max-width: 1000px; /* 양옆 사진까지 보여야 하므로 가로폭을 넓혔습니다 */
            margin: 0 auto;
            overflow: hidden;
        }

        /* 사진들이 가로로 배치되는 통로 */
        .slider-track {
            display: flex;
            align-items: center;
            transition: transform 0.5s ease-in-out; /* 부드러운 전환 효과 */
        }

        /* 개별 이미지 슬롯 설정 (가운데 한 장이 메인 사진의 반 크기 정도인 500px로 고정) */
        .slider-item {
            min-width: 500px; 
            max-width: 500px;
            box-sizing: border-box;
            padding: 0 15px; /* 사진 사이의 간격 */
            transition: all 0.5s ease-in-out;
            
            /* 기본 상태: 작고 투명하게(뿌옇게) 설정 */
            transform: scale(0.85); 
            opacity: 0.4; 
        }

        /* 🌟 가운데 활성화된 메인 사진 스타일 */
        .slider-item.active {
            transform: scale(1); /* 원래 크기 */
            opacity: 1; /* 선명하게 */
        }

        .slider-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 화살표 버튼 스타일 */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.3);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            z-index: 10;
        }

        .slider-btn:hover {
            background-color: rgba(0, 0, 0, 0.6);
        }

        /* 화살표 위치 조절 */
        .btn-left { left: 40px; }
        .btn-right { right: 40px; }
    </style>

    <button class="slider-btn btn-left" onclick="moveSlider(-1)">&#10094;</button>

    <div class="slider-container">
        <div class="slider-track" id="sliderTrack">
            <div class="slider-item"><img src="assets/img/sub1.png" alt="사진1"></div>

    <script>
        let currentIndex = 0;
        const track = document.getElementById('sliderTrack');
        const slides = track.children;
        const totalSlides = slides.length;

        function updateSlider() {
            for (let i = 0; i < totalSlides; i++) {
                slides[i].classList.remove('active');
            }
            slides[currentIndex].classList.add('active');

            const containerWidth = document.querySelector('.slider-container').offsetWidth;
            const slideWidth = slides[0].offsetWidth;
            const offset = (containerWidth / 2) - (slideWidth / 2) - (currentIndex * slideWidth);
            
            track.style.transform = `translateX(${offset}px)`;
        }

        function moveSlider(direction) {
            currentIndex += direction;
            if (currentIndex >= totalSlides) {
                currentIndex = 0;
            } else if (currentIndex < 0) {
                currentIndex = totalSlides - 1;
            }
            updateSlider();
        }

        window.addEventListener('load', updateSlider);
        window.addEventListener('resize', updateSlider);
    </script>
