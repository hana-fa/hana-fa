<style>

/* 전체 */
.tab-wrapper{
    text-align:center;
    padding-top:90px;
}

/* 버튼 영역 */
.tab-menu{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:40px;
}

/* 버튼 */
.tab-btn{
    padding:10px 18px;
    border:none;
    background:#eeeeee;
    cursor:pointer;
    border-radius:6px;
    transition:0.3s;
    font-weight:500;
}

/* 활성 버튼 */
.tab-btn.active{
    background:#9e9e9e;
    color:#fff;
}

/* hover */
.tab-btn:hover{
    background:#d6d6d6;
}

/* 이미지 영역 */
.tab-content{
    display:flex;
    justify-content:center;
}

/* 🔥 핵심: 이미지 애니메이션 */
.tab-img{
    display:none;
    width:85%;
    max-width:1200px;
    margin:0 auto;

    opacity:0;
    transform: scale(0.95);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

/* 활성 이미지 */
.tab-img.show{
    display:block;
    opacity:1;
    transform: scale(1);
}

/* 모바일 */
@media (max-width:768px){

    .tab-wrapper{
        padding-top:60px;
    }

    .tab-img{
        width:95%;
    }
}

</style>

<script>

function showTab(id, btn){

    // 이미지 변경
    document.querySelectorAll('.tab-img').forEach(img=>{
        img.classList.remove('show');
    });

    document.getElementById(id).classList.add('show');

    // 버튼 active
    document.querySelectorAll('.tab-btn').forEach(b=>{
        b.classList.remove('active');
    });

    btn.classList.add('active');
}

</script>

<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>스크롤 애니메이션 예시</title>
  
  <style>
    /* 화면을 아래로 길게 만들기 위한 임시 여백 (테스트용) */
    .spacer {
      height: 100vh; 
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: #999;
    }

    /* 1. 처음에 숨겨둘 상태 (기본 설정) */
    .fade-in-image {
      opacity: 0;                    /* 완전히 투명하게 리셋 */
      transform: translateY(50px);   /* 원래 위치보다 50px 아래에 배치 */
      transition: all 1s ease-out;   /* 1초 동안 부드럽게 변하는 효과 */
      display: block;
      margin: 50px auto;             /* 화면 가운데 정렬 */
    }

    /* 2. 스크롤을 내렸을 때 나타날 상태 */
    .fade-in-image.visible {
      opacity: 1;                    /* 선명하게 보이기 */
      transform: translateY(0);      /* 원래 제자리로 올라오기 */
    }
  </style>
</head>
<body>

  <div class="spacer">스크롤을 아래로 쭉 내려보세요 👇</div>

  <img src="img/cc.png" alt="cc 이미지" class="fade-in-image" id="scrollImg" height="200">

  <div class="spacer">사진이 멋지게 나타났나요? ✨</div>


  <script>
    window.addEventListener('scroll', function() {
      const image = document.getElementById('scrollImg');
      const imagePosition = image.getBoundingClientRect().top;
      const screenPosition = window.innerHeight / 1.2; // 화면의 80% 지점에 도달했을 때 실행

      // 이미지가 화면 안에 들어오면 'visible' 클래스를 추가해 효과를 켭니다
      if (imagePosition < screenPosition) {
        image.classList.add('visible');
      }
    });
  </script>

</body>

    <button class="slider-btn btn-right" onclick="moveSlider(1)">&#10095;</button>

    <script>
        let currentIndex = 0;
        const track = document.getElementById('sliderTrack');
        const slides = track.children;
        const totalSlides = slides.length;

        function updateSlider() {
            for (let i = 0; i < totalSlides; i++) {
                slides[i].classList.remove('active');
            }
            slides[currentIndex].classList.add('active');

            const containerWidth = document.querySelector('.slider-container').offsetWidth;
            const slideWidth = slides[0].offsetWidth;
            const offset = (containerWidth / 2) - (slideWidth / 2) - (currentIndex * slideWidth);
            
            track.style.transform = `translateX(${offset}px)`;
        }

        function moveSlider(direction) {
            currentIndex += direction;
            if (currentIndex >= totalSlides) {
                currentIndex = 0;
            } else if (currentIndex < 0) {
                currentIndex = totalSlides - 1;
            }
            updateSlider();
        }

        window.addEventListener('load', updateSlider);
        window.addEventListener('resize', updateSlider);
    </script>
